<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Foto com Moldura</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.25)),
        url("fundo.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      padding: 25px;
    }

    .container {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      padding: 28px;
      border-radius: 24px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.18);
      text-align: center;
      max-width: 460px;
      width: 100%;
    }

    h1 {
      font-size: 26px;
      margin: 0 0 12px;
      line-height: 1.2;
    }

    p {
      font-size: 16px;
      color: #555;
      margin-bottom: 24px;
    }

    input,
    button {
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
    }

    input {
      background: #eee;
    }

    button {
      background: #111;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #canvasPreview {
      width: 100%;
      aspect-ratio: 1 / 1;
      max-width: 390px;
      margin-top: 28px;
      border-radius: 50%;
      background: #f7f7f7;
      cursor: grab;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
    }

    @media (max-width: 480px) {
      body {
        align-items: flex-start;
        padding: 35px 16px;
      }

      .container {
        padding: 24px 18px;
        margin-top: 20px;
      }

      h1 {
        font-size: 24px;
      }

      p {
        font-size: 15px;
      }

      #canvasPreview {
        margin-top: 30px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Gerador de Foto com Moldura</h1>
    <p>Envie sua foto, arraste para ajustar e baixe completa.</p>

    <input type="file" id="upload" accept="image/*">

    <canvas id="canvasPreview" width="1080" height="1080"></canvas>
    <canvas id="canvasFinal" width="1080" height="1080" style="display:none;"></canvas>

    <button onclick="baixarImagem()">Baixar imagem completa</button>
  </div>

  <script>
    const upload = document.getElementById("upload");

    const canvasPreview = document.getElementById("canvasPreview");
    const ctxPreview = canvasPreview.getContext("2d");

    const canvasFinal = document.getElementById("canvasFinal");
    const ctxFinal = canvasFinal.getContext("2d");

    const moldura = new Image();
    moldura.src = "moldura.png";

    let fotoUsuario = null;

    let escala = 1;
    let posX = 0;
    let posY = 0;

    let arrastando = false;
    let inicioX = 0;
    let inicioY = 0;

    moldura.onload = function () {
      desenharCanvas();
    };

    upload.addEventListener("change", function (event) {
      const arquivo = event.target.files[0];

      if (!arquivo) return;

      const reader = new FileReader();

      reader.onload = function (e) {
        fotoUsuario = new Image();

        fotoUsuario.onload = function () {
          escala = Math.max(
            canvasPreview.width / fotoUsuario.width,
            canvasPreview.height / fotoUsuario.height
          );

          posX = (canvasPreview.width - fotoUsuario.width * escala) / 2;
          posY = (canvasPreview.height - fotoUsuario.height * escala) / 2;

          desenharCanvas();
        };

        fotoUsuario.src = e.target.result;
      };

      reader.readAsDataURL(arquivo);
    });

    function desenharCanvas() {
      desenhar(ctxFinal, false);
      desenhar(ctxPreview, true);
    }

    function desenhar(ctx, redondo) {
      ctx.clearRect(0, 0, 1080, 1080);

      if (redondo) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(540, 540, 540, 0, Math.PI * 2);
        ctx.clip();
      }

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, 1080, 1080);

      if (fotoUsuario) {
        ctx.save();
        ctx.filter = "blur(35px)";
        ctx.globalAlpha = 0.75;

        const escalaFundo = Math.max(
          1080 / fotoUsuario.width,
          1080 / fotoUsuario.height
        ) * 1.2;

        const fundoLargura = fotoUsuario.width * escalaFundo;
        const fundoAltura = fotoUsuario.height * escalaFundo;

        const fundoX = (1080 - fundoLargura) / 2;
        const fundoY = (1080 - fundoAltura) / 2;

        ctx.drawImage(
          fotoUsuario,
          fundoX,
          fundoY,
          fundoLargura,
          fundoAltura
        );

        ctx.restore();

        ctx.drawImage(
          fotoUsuario,
          posX,
          posY,
          fotoUsuario.width * escala,
          fotoUsuario.height * escala
        );
      }

      ctx.drawImage(moldura, 0, 0, 1080, 1080);

      if (redondo) {
        ctx.restore();
      }
    }

    function pegarPosicao(event) {
      const rect = canvasPreview.getBoundingClientRect();

      if (event.touches) {
        return {
          x: (event.touches[0].clientX - rect.left) * (canvasPreview.width / rect.width),
          y: (event.touches[0].clientY - rect.top) * (canvasPreview.height / rect.height)
        };
      }

      return {
        x: (event.clientX - rect.left) * (canvasPreview.width / rect.width),
        y: (event.clientY - rect.top) * (canvasPreview.height / rect.height)
      };
    }

    function iniciarArraste(event) {
      if (!fotoUsuario) return;

      arrastando = true;

      const pos = pegarPosicao(event);

      inicioX = pos.x - posX;
      inicioY = pos.y - posY;

      canvasPreview.style.cursor = "grabbing";
    }

    function moverFoto(event) {
      if (!arrastando || !fotoUsuario) return;

      event.preventDefault();

      const pos = pegarPosicao(event);

      posX = pos.x - inicioX;
      posY = pos.y - inicioY;

      desenharCanvas();
    }

    function pararArraste() {
      arrastando = false;
      canvasPreview.style.cursor = "grab";
    }

    canvasPreview.addEventListener("mousedown", iniciarArraste);
    canvasPreview.addEventListener("mousemove", moverFoto);
    canvasPreview.addEventListener("mouseup", pararArraste);
    canvasPreview.addEventListener("mouseleave", pararArraste);

    canvasPreview.addEventListener("touchstart", iniciarArraste);
    canvasPreview.addEventListener("touchmove", moverFoto);
    canvasPreview.addEventListener("touchend", pararArraste);

    function baixarImagem() {
      const imagemFinal = canvasFinal.toDataURL("image/jpeg", 0.95);

      const iphone = /iPhone|iPad|iPod/i.test(navigator.userAgent);

      if (iphone) {
        const novaAba = window.open("", "_blank");

        novaAba.document.body.style.margin = "0";
        novaAba.document.body.style.background = "#000";
        novaAba.document.body.style.display = "flex";
        novaAba.document.body.style.justifyContent = "center";
        novaAba.document.body.style.alignItems = "center";
        novaAba.document.body.style.minHeight = "100vh";

        const img = novaAba.document.createElement("img");
        img.src = imagemFinal;
        img.style.maxWidth = "100%";
        img.style.maxHeight = "100%";

        novaAba.document.body.appendChild(img);
      } else {
        const link = document.createElement("a");
        link.download = "foto-com-moldura.jpg";
        link.href = imagemFinal;
        link.click();
      }
    }
  </script>

</body>
</html>
